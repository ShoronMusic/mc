# main への push では起動しない（Vercel との「1/2 どちらが赤か」分離・二重検証の負荷軽減）
# PR では lint / 型 / 単体テストを実行。手動は Actions タブ → CI → Run workflow
# 本番ビルドは Vercel が next build を実行する
name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test
